        ["Тема 8. ОБРАЗОВАНИЕ", "Какова главная функция образования в обществе?", "Социализация личности и передача накопленного культурного опыта новым поколениям."],
        ["Тема 9. МОРАЛЬ", "Что такое мораль?", "Специфический способ регулирования общественной жизни с позиций гуманизма, добра и справедливости."],
        ["Тема 9. МОРАЛЬ", "Как звучит «золотое правило нравственности»?", "«Относись к другим людям так, как хочешь, чтобы они относились к тебе»."],
        ["Тема 9. МОРАЛЬ", "Назовите три отличия морали от права.", "неписаный характер, создается обществом (а не государством), не имеет строгой юридической ответственности за нарушение."],
        ["Тема 9. МОРАЛЬ", "В чем заключается оценочная функция морали?", "В способности давать характеристику поступкам людей с точки зрения добра и зла."],
        ["Тема 9. МОРАЛЬ", "Что такое «социальные санкции»?", "Меры одобрения или порицания (позитивные и негативные), применяемые обществом для регуляции поведения индивида."],
        ["Тема 10. РЕЛИГИЯ", "Дайте определение религии.", "Это форма духовной культуры и мировоззрение, основанное на вере в существование сверхъестественных сил."],
        ["Тема 10. РЕЛИГИЯ", "Назовите три мировые религии.", "буддизм, христианство и ислам."],
        ["Тема 10. РЕЛИГИЯ", "Чем монотеистические религии отличаются от политеистических?", "Монотеизм – это вера в одного Бога, политеизм – вера во многих богов."],
        ["Тема 10. РЕЛИГИЯ", "Является ли буддизм монотеистической религией?", "Нет, буддизм не признает Бога-творца; Будда является духовным учителем, а не Богом."],
        ["Тема 10. РЕЛИГИЯ", "В чем заключается компенсаторная функция религии?", "В оказании психологической помощи, дарении надежды и утешения в трудные моменты жизни."],
        ["Тема 10. РЕЛИГИЯ", "Что такое «конфессия»?", "Это отдельное направление или школа внутри одной конкретной религии (например, православие, католицизм и протестантизм в христианстве)."]
      ],
      "s2": [
        ["Тема 1. МИРОВОЗЗРЕНИЕ", "Что такое мировоззрение?", "Это целостное представление человека об обществе, природе и своем месте в мире."],
        ["Тема 1. МИРОВОЗЗРЕНИЕ", "Назовите основные компоненты мировоззрения.", "К ним относятся: знания, ценности, убеждения, идеалы и нормы."],
        ["Тема 1. МИРОВОЗЗРЕНИЕ", "Какова главная функция мировоззрения?", "Оно выступает жизненным ориентиром, задает цели и формирует систему ценностей."],
        ["Тема 1. МИРОВОЗЗРЕНИЕ", "Что такое обыденное (житейское) мировоззрение?", "Это тип мировоззрения, основанный на личном практическом опыте и здравом смысле."],
        ["Тема 1. МИРОВОЗЗРЕНИЕ", "Чем отличается теоретическое мировоззрение?", "Оно опирается на логику, научные знания и глубокий интеллектуальный анализ."],
        ["Тема 1. МИРОВОЗЗРЕНИЕ", "В чем особенность мифологического мировоззрения?", "Это объяснение устройства мира через предания, сказания и веру в фантастических существ."],
        ["Тема 1. МИРОВОЗЗРЕНИЕ", "На чем основано религиозное мировоззрение?", "На вере в существование сверхъестественных сил и строгом соблюдении догматов."],
        ["Тема 1. МИРОВОЗЗРЕНИЕ", "Какова главная черта научного мировоззрения?", "Строгая опора на факты, доказательность, объективность и проверяемость."],
        ["Тема 1. МИРОВОЗЗРЕНИЕ", "Что свойственно философскому мировоззрению?", "Рационально-теоретическое осмысление самых общих законов развития природы, общества и мышления."],
        ["Тема 1. МИРОВОЗЗРЕНИЕ", "Что такое менталитет?", "Это совокупность умственных, эмоциональных и культурных особенностей, присущих определенной группе."],
        ["Тема 2. СОЦИАЛЬНЫЕ ГРУППЫ", "Что такое социальная группа?", "Совокупность людей, имеющих общий социально значимый признак, общие интересы и ценности."],
        ["Тема 2. СОЦИАЛЬНЫЕ ГРУППЫ", "Перечислите основные признаки социальной группы.", "К ним относятся: взаимодействие членов, признание своей принадлежности к группе и признание этого другими."],
        ["Тема 2. СОЦИАЛЬНЫЕ ГРУППЫ", "Что такое первичная социальная группа?", "Это небольшая группа, где отношения носят тесный, эмоциональный и межличностный характер (например, семья)."],
        ["Тема 2. СОЦИАЛЬНЫЕ ГРУППЫ", "В чем специфика вторичной социальной группы?", "Отношения в ней формальны и направлены на достижение конкретной цели (например, коллектив на работе)."],
        ["Тема 2. СОЦИАЛЬНЫЕ ГРУППЫ", "Чем формальная группа отличается от неформальной?", "Формальная создается на базе официальных документов, а неформальная – на основе личных симпатий."],
        ["Тема 2. СОЦИАЛЬНЫЕ ГРУППЫ", "Что такое номинальная социальная группа?", "Искусственно выделенная для статистического учета категория людей (например, пассажиры поездов)."],
        ["Тема 2. СОЦИАЛЬНЫЕ ГРУППЫ", "Что такое реальная социальная группа?", "Объединение людей, осознающих свою принадлежность к группе и реально взаимодействующих между собой."],
        ["Тема 2. СОЦИАЛЬНЫЕ ГРУППЫ", "Кто такая молодежь с точки зрения социологии?", "Социально-демографическая группа, выделяемая на основе возрастных характеристик и особенностей социального положения."],
        ["Тема 2. СОЦИАЛЬНЫЕ ГРУППЫ", "Назовите типичные черты молодежи.", "Переходность положения, высокий уровень социальной мобильности, активный поиск своего места в жизни."],
        ["Тема 2. СОЦИАЛЬНЫЕ ГРУППЫ", "Что такое молодежная субкультура?", "Культура молодого поколения, отличающаяся своими ценностями, сленгом, модой и стилем поведения."],
        ["Тема 3. СОЦИАЛЬНЫЙ КОНФЛИКТ", "Что такое социальный конфликт?", "Это высшая стадия развития противоречий в отношениях между людьми, социальными группами или обществом в целом."],
        ["Тема 3. СОЦИАЛЬНЫЙ КОНФЛИКТ", "Кого называют субъектами социального конфликта?", "Непосредственных участников (индивиды или группы), между которыми возникло столкновение."],
        ["Тема 3. СОЦИАЛЬНЫЙ КОНФЛИКТ", "Что такое предмет социального конфликта?", "Конкретное материальное или духовное благо, из-за которого началось противостояние."],
        ["Тема 3. СОЦИАЛЬНЫЙ КОНФЛИКТ", "Чем повод конфликта отличается от причины?", "Повод – это конкретное событие (искра), а причина – глубокие объективные противоречия."],
        ["Тема 3. СОЦИАЛЬНЫЙ КОНФЛИКТ", "Назовите основные стадии социального конфликта.", "Предконфликтная стадия, сам конфликт и разрешение конфликта."],
        ["Тема 3. СОЦИАЛЬНЫЙ КОНФЛИКТ", "В чем заключается разрешение конфликта путем компромисса?", "В решении проблемы через взаимные уступки сторон."],
        ["Тема 3. СОЦИАЛЬНЫЙ КОНФЛИКТ", "Что такое переговоры как способ разрешения конфликта?", "Мирное обсуждение проблемы сторонами для поиска взаимоприемлемого решения."],
        ["Тема 3. СОЦИАЛЬНЫЙ КОНФЛИКТ", "В чем суть посредничества (медиации)?", "Привлечение третьей, нейтральной стороны для помощи в разрешении спора без вынесения обязательного решения."],
        ["Тема 3. СОЦИАЛЬНЫЙ КОНФЛИКТ", "Что такое арбитраж в социальном конфликте?", "Обращение к специальному органу власти, решение которого обязательно для исполнения всеми сторонами."],
        ["Тема 3. СОЦИАЛЬНЫЙ КОНФЛИКТ", "Какие функции может выполнять социальный конфликт?", "Позитивные (обновление, выявление проблем) и негативные (разрушение, стресс)."],
        ["Тема 4. СВОБОДА И ОТВЕТСТВЕННОСТЬ", "Что такое свобода?", "Способность человека действовать в соответствии со своими интересами, опираясь на познание объективной необходимости."],
        ["Тема 4. СВОБОДА И ОТВЕТСТВЕННОСТЬ", "Может ли свобода в обществе быть абсолютной?", "Нет, так как абсолютная свобода одного человека неминуемо нарушает свободу других людей."],
        ["Тема 4. СВОБОДА И ОТВЕТСТВЕННОСТЬ", "Что такое необходимость?", "Объективные законы природы и общества, которые не зависят от воли человека, но определяют рамки его свободы."],
        ["Тема 4. СВОБОДА И ОТВЕТСТВЕННОСТЬ", "Как соотносятся свобода и ответственность?", "Свобода – это всегда выбор, а за последствия своего выбора человек несет полную ответственность."],
        ["Тема 4. СВОБОДА И ОТВЕТСТВЕННОСТЬ", "Что такое фатализм?", "Мировоззрение, утверждающее, что все события в мире предопределены судьбой и человек не властен над ними."],
        ["Тема 4. СВОБОДА И ОТВЕТСТВЕННОСТЬ", "Что такое волюнтаризм?", "Мировоззрение, абсолютизирующее свободу воли человека и игнорирующее объективные законы и необходимость."],
        ["Тема 4. СВОБОДА И ОТВЕТСТВЕННОСТЬ", "Что такое социальная ответственность?", "Осознание человеком последствий своих поступков для общества и готовность отвечать за них."],
        ["Тема 4. СВОБОДА И ОТВЕТСТВЕННОСТЬ", "Какие виды ответственности существуют?", "Юридическая, моральная, политическая, дисциплинарная и другие."],
        ["Тема 4. СВОБОДА И ОТВЕТСТВЕННОСТЬ", "Что является главным внутренним регулятором моральной ответственности?", "Совесть человека."],
        ["Тема 5. ОТКЛОНЯЮЩЕЕСЯ ПОВЕДЕНИЕ", "Что такое отклоняющееся (девиантное) поведение?", "Это поведение индивида или группы, которое не соответствует общепринятым социальным нормам."],
        ["Тема 5. ОТКЛОНЯЮЩЕЕСЯ ПОВЕДЕНИЕ", "Всегда ли отклоняющееся поведение носит негативный характер?", "Нет, оно может быть позитивным: героизм, гениальность, сверхтрудолюбие."],
        ["Тема 5. ОТКЛОНЯЮЩЕЕСЯ ПОВЕДЕНИЕ", "Приведите примеры негативного девиантного поведения.", "К ним относятся: алкоголизм, наркомания, хулиганство, игромания."],
        ["Тема 5. ОТКЛОНЯЮЩЕЕСЯ ПОВЕДЕНИЕ", "Что такое делинквентное поведение?", "Крайняя форма девиантного поведения, представляющая собой нарушение норм права (преступность)."],
        ["Тема 5. ОТКЛОНЯЮЩЕЕСЯ ПОВЕДЕНИЕ", "Назовите основные причины девиантного поведения.", "Социальное неравенство, влияние маргинальных групп, кризисы в обществе и семье."],
        ["Тема 5. ОТКЛОНЯЮЩЕЕСЯ ПОВЕДЕНИЕ", "Что такое социальный контроль?", "Механизм регуляции отношений индивида и общества с целью укрепления порядка и стабильности."],
        ["Тема 5. ОТКЛОНЯЮЩЕЕСЯ ПОВЕДЕНИЕ", "Из каких двух основных элементов состоит социальный контроль?", "Из социальных норм и социальных санкций."],
        ["Тема 5. ОТКЛОНЯЮЩЕЕСЯ ПОВЕДЕНИЕ", "Что такое социальная норма?", "Установленное в обществе правило или стандарт поведения, регулирующий отношения между людьми."],
        ["Тема 5. ОТКЛОНЯЮЩЕЕСЯ ПОВЕДЕНИЕ", "На какие два основных вида делятся социальные санкции?", "На формальные (от официальных организаций) и неформальные (от социального окружения)."],
        ["Тема 5. ОТКЛОНЯЮЩЕЕСЯ ПОВЕДЕНИЕ", "Приведите примеры позитивных и негативных санкций.", "Позитивные: премия, похвала. Негативные: штраф, бойкот."],
        ["Тема 6. СОЦИАЛЬНАЯ РОЛЬ И СТАТУС", "Что такое социальный статус?", "Положение человека в обществе, определяющее его права, обязанности и привилегии."],
        ["Тема 6. СОЦИАЛЬНАЯ РОЛЬ И СТАТУС", "Что такое предписанный социальный статус?", "Статус, данный человеку от рождения или независимо от его воли (пол, возраст, национальность)."],
        ["Тема 6. СОЦИАЛЬНАЯ РОЛЬ И СТАТУС", "Что такое достигнутый социальный статус?", "Статус, приобретенный человеком благодаря его собственным усилиям (образование, профессия)."],
        ["Тема 6. СОЦИАЛЬНАЯ РОЛЬ И СТАТУС", "Что такое статусный набор?", "Совокупность всех социальных статусов, которыми одновременно обладает один конкретный человек."],
        ["Тема 6. СОЦИАЛЬНАЯ РОЛЬ И СТАТУС", "Что такое социальная роль?", "Ожидаемая модель поведения, которую общество требует от человека с определенным социальным статусом."],
        ["Тема 6. СОЦИАЛЬНАЯ РОЛЬ И СТАТУС", "Чем социальный статус отличается от социальной роли?", "Статус – это положение (кем человек является), а роль – это поведение (что человек делает)."],
        ["Тема 6. СОЦИАЛЬНАЯ РОЛЬ И СТАТУС", "Что такое ролевой конфликт?", "Ситуация, когда требования различных социальных ролей одного человека противоречат друг другу."],
        ["Тема 6. СОЦИАЛЬНАЯ РОЛЬ И СТАТУС", "Что такое престиж в социологии?", "Оценка обществом значимости тех или иных позиций, занимаемых индивидом (например, престиж профессии)."],
        ["Тема 6. СОЦИАЛЬНАЯ РОЛЬ И СТАТУС", "Что такое авторитет?", "Степень признания обществом личных и деловых качеств конкретного человека."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "Что такое социальная стратификация?", "Это разделение общества на расположенные в иерархическом порядке слои (страты)."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "Назовите основные критерии социальной стратификации в современном обществе.", "К ним относят: уровень дохода, объем власти, уровень образования и престиж профессии."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "Перечислите исторические типы социальной стратификации.", "Рабство, касты, сословия и классы."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "В чем суть классовой системы стратификации?", "Принадлежность к страте определяется отношением к собственности и доходом (открытая система)."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "Что такое социальная мобильность?", "Любые изменения в социальном положении индивида или группы, переход из одной страты в другую."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "Что такое вертикальная социальная мобильность?", "Перемещение индивида вверх (восходящая) или вниз (нисходящая) по социальной иерархии."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "Что такое горизонтальная социальная мобильность?", "Переход человека в другую группу без изменения уровня его социального статуса."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "В чем отличие межпоколенной мобильности от внутрипоколенной?", "Межпоколенная: дети меняют статус по сравнению с родителями. Внутрипоколенная: человек меняет статус в течение жизни."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "Что такое «социальные лифты» (каналы социальной мобильности)?", "Это пути, по которым происходит перемещение людей из одних социальных групп в другие."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "Назовите основные социальные лифты современного общества.", "К ним относятся: образование, армия, бизнес, церковь, политика, брак."],
        ["Тема 7. СОЦИАЛЬНАЯ МОБИЛЬНОСТЬ И СТРАТИФИКАЦИЯ", "Кто такие маргиналы?", "Это люди, утратившие свой прежний социальный статус, но не адаптировавшиеся в новой социальной среде."],
        ["Тема 8. СЕМЬЯ И БРАК", "Что такое семья как малая социальная группа?", "Объединение людей, связанных кровным родством или браком, общностью быта и взаимной ответственностью."],
        ["Тема 8. СЕМЬЯ И БРАК", "Что такое семья как социальный институт?", "Комплекс социальных норм, образцов поведения, прав и обязанностей, регулирующих отношения супругов, родителей и детей."],
        ["Тема 8. СЕМЬЯ И БРАК", "В чем заключается репродуктивная функция семьи?", "В биологическом воспроизводстве населения и продолжении человеческого рода."],
        ["Тема 8. СЕМЬЯ И БРАК", "В чем суть воспитательной функции семьи?", "В первичной социализации детей, передаче им моральных норм, ценностей и жизненного опыта."],
        ["Тема 8. СЕМЬЯ И БРАК", "В чем проявляется экономическая (хозяйственно-бытовая) функция семьи?", "В ведении совместного хозяйства и финансовой поддержке всех членов семьи."],
        ["Тема 8. СЕМЬЯ И БРАК", "Чем нуклеарная семья отличается от расширенной (многопоколенной)?", "Нуклеарная состоит только из супругов и детей, расширенная включает и других родственников (например, бабушек)."],
        ["Тема 8. СЕМЬЯ И БРАК", "Какова особенность патриархальной (традиционной) семьи?", "Главенство мужчины, жесткое разделение обязанностей на мужские и женские, экономическая зависимость женщины."],
        ["Тема 8. СЕМЬЯ И БРАК", "Что характерно для партнерской (эгалитарной) семьи?", "Равноправие супругов, совместное принятие решений и справедливое распределение бытовых обязанностей."],
        ["Тема 8. СЕМЬЯ И БРАК", "Что такое брак?", "Исторически обусловленная, санкционированная и регулируемая обществом форма отношений между мужчиной и женщиной."],
        ["Тема 8. СЕМЬЯ И БРАК", "Назовите основные условия заключения брака в РФ.", "Взаимное добровольное согласие сторон и достижение ими брачного возраста."],
        ["Тема 8. СЕМЬЯ И БРАК", "Перечислите основные обстоятельства, препятствующие заключению брака.", "Наличие другого нерасторгнутого брака, близкое кровное родство, недееспособность вследствие психического расстройства."],
        ["Тема 8. СЕМЬЯ И БРАК", "Что такое фактический (сожительство) брак?", "Длительное совместное проживание мужчины и женщины без официальной регистрации отношений в ЗАГС."]
      ],
      "s3_1": [
        ["Тема 1. ОСНОВЫ ЭКОНОМИКИ", "Что такое экономика как наука?", "Это наука, изучающая способы удовлетворения постоянно растущих потребностей общества в условиях ограниченности ресурсов."],
        ["Тема 1. ОСНОВЫ ЭКОНОМИКИ", "Что такое экономика как хозяйство?", "Это система хозяйствования, обеспечивающая общество материальными и духовными благами."],
        ["Тема 1. ОСНОВЫ ЭКОНОМИКИ", "Назовите главную проблему экономики.", "Удовлетворение безграничных потребностей людей с помощью ограниченных ресурсов."],
        ["Тема 1. ОСНОВЫ ЭКОНОМИКИ", "Что такое факторы производства?", "Ресурсы, используемые людьми для создания экономических благ."],
        ["Тема 1. ОСНОВЫ ЭКОНОМИКИ", "Перечислите основные факторы производства.", "К ним относятся: труд, земля, капитал, предпринимательские способности и информация."],
        ["Тема 1. ОСНОВЫ ЭКОНОМИКИ", "Что является факторным доходом от труда?", "Заработная плата."],
        ["Тема 1. ОСНОВЫ ЭКОНОМИКИ", "Что является факторным доходом от капитала?", "Процент."],
        ["Тема 1. ОСНОВЫ ЭКОНОМИКИ", "Что является факторным доходом от предпринимательских способностей?", "Прибыль."],
        ["Тема 1. ОСНОВЫ ЭКОНОМИКИ", "Что такое макроэкономика?", "Раздел науки, изучающий экономику страны или мира в целом."],
        ["Тема 1. ОСНОВЫ ЭКОНОМИКИ", "Что такое микроэкономика?", "Раздел науки, изучающий поведение отдельных потребителей, фирм и отраслей."],
        ["Тема 2. ЭКОНОМИЧЕСКИЕ СИСТЕМЫ", "Что такое экономическая система?", "Способ организации хозяйственной жизни общества, определяющий, что, как и для кого производить."],
        ["Тема 2. ЭКОНОМИЧЕСКИЕ СИСТЕМЫ", "Назовите основные типы экономических систем.", "К ним относятся: традиционная, командная (плановая), рыночная и смешанная."],
        ["Тема 2. ЭКОНОМИЧЕСКИЕ СИСТЕМЫ", "В чем главная особенность традиционной экономики?", "Опора на обычаи, преобладание ручного труда и натурального хозяйства."],
        ["Тема 2. ЭКОНОМИЧЕСКИЕ СИСТЕМЫ", "Что характерно для командной (плановой) экономики?", "Государственная собственность на средства производства и централизованное директивное планирование."],
        ["Тема 2. ЭКОНОМИЧЕСКИЕ СИСТЕМЫ", "Каковы признаки рыночной экономики?", "Частная собственность, свобода предпринимательства, конкуренция и свободное ценообразование."],
        ["Тема 2. ЭКОНОМИЧЕСКИЕ СИСТЕМЫ", "Что такое смешанная экономика?", "Система, сочетающая механизмы рынка с государственным регулированием для сглаживания недостатков рынка."],
        ["Тема 3. РЫНОК И КОНКУРЕНЦИЯ", "Что такое рынок?", "Совокупность экономических отношений, связанных с обменом товаров и услуг в результате купли-продажи."],
        ["Тема 3. РЫНОК И КОНКУРЕНЦИЯ", "Что такое конкуренция?", "Соперничество между участниками рынка за лучшие условия производства и купли-продажи."],
        ["Тема 3. РЫНОК И КОНКУРЕНЦИЯ", "Назовите виды рыночной конкуренции.", "Совершенная (чистая) и несовершенная конкуренция."],
        ["Тема 3. РЫНОК И КОНКУРЕНЦИЯ", "Что такое монополия?", "Тип несовершенной конкуренции, при котором на рынке действует только один продавец уникального товара."],
        ["Тема 3. РЫНОК И КОНКУРЕНЦИЯ", "Что такое олигополия?", "Рынок, на котором господствуют несколько крупных фирм, преграждающих вход новым конкурентам."],
        ["Тема 3. РЫНОК И КОНКУРЕНЦИЯ", "Что такое монополистическая конкуренция?", "Рынок, где множество фирм продают схожие, но не идентичные (дифференцированные) товары."],
        ["Тема 3. РЫНОК И КОНКУРЕНЦИЯ", "Что такое монопсония?", "Ситуация на рынке, когда существует множество продавцов, но только один покупатель."],
        ["Тема 4. СПРОС И ПРЕДЛОЖЕНИЕ", "Что такое спрос?", "Желание и возможность потребителя купить определенный товар по определенной цене в данное время."],
        ["Тема 4. СПРОС И ПРЕДЛОЖЕНИЕ", "Как звучит закон спроса?", "При прочих равных условиях, чем выше цена, тем ниже величина спроса, и наоборот."],
        ["Тема 4. СПРОС И ПРЕДЛОЖЕНИЕ", "Что такое предложение?", "Готовность производителя произвести и продать товар по определенной цене в данное время."],
        ["Тема 4. СПРОС И ПРЕДЛОЖЕНИЕ", "Как звучит закон предложения?", "При прочих равных условиях, чем выше цена, тем выше величина предложения."],
        ["Тема 4. СПРОС И ПРЕДЛОЖЕНИЕ", "Что такое равновесная цена?", "Цена, при которой величина спроса равна величине предложения."],
        ["Тема 4. СПРОС И ПРЕДЛОЖЕНИЕ", "Приведите примеры неценовых факторов спроса.", "К ним относятся: вкусы потребителей, уровень доходов, цены на товары-заменители, мода, сезонность."],
        ["Тема 5. ИЗДЕРЖКИ ПРОИЗВОДСТВА", "Что такое издержки производства?", "Затраты производителя на приобретение и использование факторов производства."],
        ["Тема 5. ИЗДЕРЖКИ ПРОИЗВОДСТВА", "На какие два вида делятся издержки в краткосрочном периоде?", "На постоянные и переменные."],
        ["Тема 5. ИЗДЕРЖКИ ПРОИЗВОДСТВА", "Что такое постоянные издержки?", "Затраты, которые не зависят от объема выпускаемой продукции."],
        ["Тема 5. ИЗДЕРЖКИ ПРОИЗВОДСТВА", "Что такое переменные издержки?", "Затраты, величина которых напрямую зависит от объема выпускаемой продукции."],
        ["Тема 5. ИЗДЕРЖКИ ПРОИЗВОДСТВА", "Приведите примеры постоянных издержек.", "К ним относятся: арендная плата, страховые взносы, проценты по кредиту, оклады администрации."],
        ["Тема 5. ИЗДЕРЖКИ ПРОИЗВОДСТВА", "Приведите примеры переменных издержек.", "К ним относятся: расходы на сырье и материалы, оплата электроэнергии, сдельная зарплата рабочих."],
        ["Тема 6. ФИНАНСОВЫЕ ИНСТИТУТЫ", "Что такое финансовый институт?", "Организация, выполняющая функции посредника между теми, у кого есть свободные деньги, и теми, кто в них нуждается."],
        ["Тема 6. ФИНАНСОВЫЕ ИНСТИТУТЫ", "Приведите примеры финансовых институтов.", "К ним относятся: банки, страховые компании, пенсионные фонды, инвестиционные компании."],
        ["Тема 6. ФИНАНСОВЫЕ ИНСТИТУТЫ", "Для чего нужны страховые компании?", "Для защиты имущественных интересов граждан и организаций при наступлении страховых случаев за счет уплаченных взносов."],
        ["Тема 6. ФИНАНСОВЫЕ ИНСТИТУТЫ", "В чем заключается роль пенсионных фондов?", "В сборе средств для выплаты пенсий и инвестировании этих средств для получения дохода."],
        ["Тема 7. БАНКИ", "Что такое банковская система?", "Совокупность действующих в стране банков и других кредитных учреждений."],
        ["Тема 7. БАНКИ", "Из каких уровней состоит банковская система РФ?", "Она включает два уровня: Центральный банк и коммерческие банки."],
        ["Тема 7. БАНКИ", "Какова главная функция Центрального банка?", "Эмиссия денег, защита и обеспечение устойчивости национальной валюты (рубля)."],
        ["Тема 7. БАНКИ", "Имеет ли право Центральный банк обслуживать физических лиц?", "Нет, он работает только с государством и коммерческими банками."],
        ["Тема 7. БАНКИ", "Какие функции выполняют коммерческие банки?", "Привлечение вкладов, выдача кредитов, расчетно-кассовое обслуживание граждан и фирм."],
        ["Тема 7. БАНКИ", "Что такое кредит?", "Ссуда в денежной или товарной форме, предоставляемая заемщику на условиях возвратности и платности."],
        ["Тема 8. ПРЕДПРИНИМАТЕЛЬСТВО", "Что такое предпринимательство?", "Самостоятельная, инициативная деятельность людей, направленная на систематическое получение прибыли."],
        ["Тема 8. ПРЕДПРИНИМАТЕЛЬСТВО", "Назовите основные признаки предпринимательства.", "К ним относятся: самостоятельность, риск, опора на инновации, цель – получение прибыли."],
        ["Тема 8. ПРЕДПРИНИМАТЕЛЬСТВО", "Что такое источники финансирования бизнеса?", "Каналы получения средств для создания и развития предприятия."],
        ["Тема 8. ПРЕДПРИНИМАТЕЛЬСТВО", "На какие группы делятся источники финансирования бизнеса?", "На внутренние (собственные) и внешние (заемные)."],
        ["Тема 8. ПРЕДПРИНИМАТЕЛЬСТВО", "Приведите примеры внутренних источников финансирования.", "К ним относятся: чистая прибыль фирмы, амортизационные отчисления."],
        ["Тема 8. ПРЕДПРИНИМАТЕЛЬСТВО", "Приведите примеры внешних источников финансирования.", "К ним относятся: банковский кредит, выпуск акций и облигаций, государственные субсидии."],
        ["Тема 9. РЫНОК ТРУДА И БЕЗРАБОТИЦА", "Что такое рынок труда?", "Сфера экономических отношений, где формируется спрос и предложение на рабочую силу."],
        ["Тема 9. РЫНОК ТРУДА И БЕЗРАБОТИЦА", "Что такое заработная плата?", "Форма материального вознаграждения, которую наемный работник получает за свой труд."],
        ["Тема 9. РЫНОК ТРУДА И БЕЗРАБОТИЦА", "Чем номинальная заработная плата отличается от реальной?", "Номинальная – это сумма денег, а реальная – объем благ, которые можно на нее купить."],
        ["Тема 9. РЫНОК ТРУДА И БЕЗРАБОТИЦА", "Что такое безработица?", "Социально-экономическое явление, при котором часть трудоспособного населения желает, но не может найти работу."],
        ["Тема 9. РЫНОК ТРУДА И БЕЗРАБОТИЦА", "Назовите основные виды безработицы.", "К ним относятся: фрикционная, структурная, циклическая и сезонная."],
        ["Тема 9. РЫНОК ТРУДА И БЕЗРАБОТИЦА", "Что такое фрикционная безработица?", "Безработица, связанная с добровольной сменой работы или первичным поиском работы."],
        ["Тема 9. РЫНОК ТРУДА И БЕЗРАБОТИЦА", "В чем причина структурной безработицы?", "Устаревание профессий из-за технического прогресса и изменения структуры спроса."],
        ["Тема 9. РЫНОК ТРУДА И БЕЗРАБОТИЦА", "С чем связана циклическая безработица?", "С экономическим кризисом и общим спадом производства в стране."],
        ["Тема 9. РЫНОК ТРУДА И БЕЗРАБОТИЦА", "Что такое сезонная безработица?", "Безработица, возникающая из-за сезонных колебаний спроса на труд в определенных отраслях (например, в сельском хозяйстве)."]
      ],
      "s3_2": [
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Что такое инфляция?", "Процесс обесценивания денег, который проявляется в виде долговременного повышения цен на товары и услуги."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "В чем заключается причина инфляции спроса?", "В ситуации, когда доходы населения и спрос растут быстрее, чем объем производства товаров."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Что вызывает инфляцию издержек (предложения)?", "Удорожание факторов производства (сырья, электроэнергии, зарплат), ведущее к росту цен на готовую продукцию."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Как называется инфляция, при которой цены растут до 10% в год?", "Ползучая (умеренная) инфляция."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Что характерно для гиперинфляции?", "Рост цен более чем на 50% в месяц, ведущий к полному расстройству финансовой системы."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Назовите негативные последствия инфляции.", "К ним относятся: снижение реальных доходов населения, обесценивание сбережений и падение уровня жизни."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Что такое экономический рост?", "Долговременное увеличение реального объема валового внутреннего продукта (ВВП) как в абсолютных значениях, так и в расчете на каждого жителя страны."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Что такое экстенсивный экономический рост?", "Увеличение ВВП за счет расширения масштабов использования ресурсов (вовлечение новых земель, найм дополнительных рабочих)."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "В чем суть интенсивного экономического роста?", "Увеличение ВВП за счет качественного улучшения факторов производства (внедрение новых технологий, повышение квалификации работников)."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Что такое валовой внутренний продукт (ВВП)?", "Рыночная стоимость всех конечных товаров и услуг, произведенных за год на территории государства."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Чем реальный ВВП отличается от номинального?", "Номинальный рассчитывается в текущих ценах, а реальный – с учетом уровня инфляции (в ценах базового года)."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Что такое валовой национальный продукт (ВНП)?", "Рыночная стоимость конечных благ, созданных гражданами государства как внутри страны, так и за рубежом."],
        ["Тема 10. ЭКОНОМИЧЕСКИЙ РОСТ И РАЗВИТИЕ", "Что отражает понятие «экономический цикл»?", "Периодические колебания деловой активности, включающие фазы подъема, пика, спада (рецессии) и дна."],
        ["Тема 11. РОЛЬ ГОСУДАРСТВА В ЭКОНОМИКЕ", "Каковы основные экономические функции государства?", "К ним относятся: защита конкуренции, производство общественных благ, перераспределение доходов и борьба с кризисами."],
        ["Тема 11. РОЛЬ ГОСУДАРСТВА В ЭКОНОМИКЕ", "Что такое общественные блага?", "Товары и услуги, которые государство предоставляет всем гражданам на равных началах (оборона, бесплатное образование, освещение улиц)."],
        ["Тема 11. РОЛЬ ГОСУДАРСТВА В ЭКОНОМИКЕ", "Что относится к прямым (административным) методам регулирования экономики?", "К ним относятся: издание законов, лицензирование, установление квот и штрафов."],
        ["Тема 11. РОЛЬ ГОСУДАРСТВА В ЭКОНОМИКЕ", "Что относится к косвенным (экономическим) методам регулирования экономики?", "К ним относятся: изменение налоговых ставок, ключевой ставки Центробанка и регулирование госбюджета."],
        ["Тема 11. РОЛЬ ГОСУДАРСТВА В ЭКОНОМИКЕ", "Что такое монетарная (кредитно-денежная) политика?", "Меры Центрального банка по регулированию объема денежной массы и изменению ключевой ставки для контроля инфляции."],
        ["Тема 11. РОЛЬ ГОСУДАРСТВА В ЭКОНОМИКЕ", "Что такое фискальная (бюджетно-налоговая) политика?", "Меры правительства по изменению государственных расходов и системы налогообложения."],
        ["Тема 12. НАЛОГИ", "Что такое налоги?", "Обязательные, безвозмездные платежи физических и юридических лиц государству."],
        ["Тема 12. НАЛОГИ", "Какова главная (фискальная) функция налогов?", "Формирование доходной части государственного бюджета."],
        ["Тема 12. НАЛОГИ", "Чем прямые налоги отличаются от косвенных?", "Прямые взимаются непосредственно с доходов или имущества, а косвенные изначально включены в цену товаров и услуг."],
        ["Тема 12. НАЛОГИ", "Приведите примеры прямых налогов.", "К ним относятся: налог на доходы физических лиц (НДФЛ), налог на прибыль организаций, транспортный налог."],
        ["Тема 12. НАЛОГИ", "Приведите примеры косвенных налогов.", "К ним относятся: налог на добавленную стоимость (НДС), акцизы, таможенные пошлины."],
        ["Тема 12. НАЛОГИ", "В чем суть прогрессивной шкалы налогообложения?", "Ставка налога возрастает по мере увеличения уровня дохода налогоплательщика."],
        ["Тема 12. НАЛОГИ", "Что характерно для пропорциональной шкалы налогообложения?", "Ставка налога остается неизменной независимо от размера дохода."],
        ["Тема 12. НАЛОГИ", "Назовите три уровня налогов в Российской Федерации.", "К ним относятся: федеральные, региональные и местные налоги."],
        ["Тема 12. НАЛОГИ", "Какие налоги относятся к местным в РФ?", "К ним относятся: земельный налог, налог на имущество физических лиц и торговый сбор."],
        ["Тема 13. ГОСУДАРСТВЕННЫЙ БЮДЖЕТ", "Что такое государственный бюджет?", "Сводный финансовый план государства, отражающий его доходы и расходы на определенный период (обычно на год)."],
        ["Тема 13. ГОСУДАРСТВЕННЫЙ БЮДЖЕТ", "Из чего состоит доходная часть государственного бюджета?", "Она формируется из налогов, таможенных пошлин, прибыли государственных предприятий и эмиссии денег."],
        ["Тема 13. ГОСУДАРСТВЕННЫЙ БЮДЖЕТ", "На что идут средства из расходной части государственного бюджета?", "К основным статьям относятся: социальные выплаты, оборона, содержание госаппарата и развитие инфраструктуры."],
        ["Тема 13. ГОСУДАРСТВЕННЫЙ БЮДЖЕТ", "Что такое дефицит государственного бюджета?", "Ситуация, при которой запланированные расходы государства превышают его доходы."],
        ["Тема 13. ГОСУДАРСТВЕННЫЙ БЮДЖЕТ", "Что такое профицит государственного бюджета?", "Ситуация, при которой доходы государства превышают его запланированные расходы."],
        ["Тема 14. ГОСУДАРСТВЕННЫЙ ДОЛГ", "Что такое государственный долг?", "Сумма задолженности государства перед отечественными и иностранными кредиторами."],
        ["Тема 14. ГОСУДАРСТВЕННЫЙ ДОЛГ", "Чем внутренний государственный долг отличается от внешнего?", "Внутренний – это долг перед гражданами и фирмами своей страны, а внешний – перед другими государствами и международными организациями."],
        ["Тема 15. МИРОВАЯ ЭКОНОМИКА", "Что такое мировая экономика?", "Совокупность национальных экономик, связанных между собой системой международных экономических отношений."],
        ["Тема 15. МИРОВАЯ ЭКОНОМИКА", "Что такое международное разделение труда?", "Специализация отдельных стран на производстве определенных видов товаров и услуг для последующего обмена."],
        ["Тема 15. МИРОВАЯ ЭКОНОМИКА", "Чем экспорт отличается от импорта?", "Экспорт – это вывоз товаров из страны для продажи, а импорт – ввоз товаров из-за границы."],
        ["Тема 15. МИРОВАЯ ЭКОНОМИКА", "Что такое сальдо торгового баланса?", "Разница между стоимостью экспорта и импорта страны за определенный период."],
        ["Тема 15. МИРОВАЯ ЭКОНОМИКА", "Что такое протекционизм?", "Государственная политика защиты отечественных производителей от иностранной конкуренции с помощью пошлин и квот."],
        ["Тема 15. МИРОВАЯ ЭКОНОМИКА", "Что такое фритредерство (свободная торговля)?", "Политика минимального вмешательства государства во внешнюю торговлю, отсутствие искусственных барьеров для импорта."],
        ["Тема 15. МИРОВАЯ ЭКОНОМИКА", "Назовите основные методы протекционизма.", "К ним относятся: введение высоких таможенных пошлин, квотирование импорта, эмбарго и субсидирование местных производителей."]
      ],
      "s4_1": [
        ["Тема 1. ПОЛИТИКА И ВЛАСТЬ", "Что такое политика?", "Это деятельность, направленная на управление обществом и распределение ресурсов и власти."],
        ["Тема 1. ПОЛИТИКА И ВЛАСТЬ", "Что такое власть?", "Это способность и возможность одного человека или группы лиц оказывать влияние на других, управлять их поведением."],
        ["Тема 1. ПОЛИТИКА И ВЛАСТЬ", "Назовите основные источники власти.", "К ним относятся: сила, авторитет, закон, богатство и харизма."],
        ["Тема 1. ПОЛИТИКА И ВЛАСТЬ", "Что такое политическая власть?", "Право, способность и возможность отстаивать и претворять в жизнь определенные политические взгляды, установки и цели."],
        ["Тема 1. ПОЛИТИКА И ВЛАСТЬ", "Что означает термин «легитимность власти»?", "Это признание обществом законности и справедливости действующей власти, готовность ей подчиняться."],
        ["Тема 1. ПОЛИТИКА И ВЛАСТЬ", "Что такое легальность власти?", "Это формальная законность власти, ее соответствие действующей конституции и законам."],
        ["Тема 1. ПОЛИТИКА И ВЛАСТЬ", "Назовите типы легитимности по Максу Веберу.", "К ним относятся: традиционный, харизматический и рационально-легальный типы."],
        ["Тема 1. ПОЛИТИКА И ВЛАСТЬ", "В чем суть харизматического типа легитимности?", "Власть опирается на исключительные личные качества лидера и слепую веру в него масс."],
        ["Тема 1. ПОЛИТИКА И ВЛАСТЬ", "Каковы основные функции политической власти?", "К ним относятся: управленческая, интегрирующая, контролирующая и мобилизационная."],
        ["Тема 1. ПОЛИТИКА И ВЛАСТЬ", "Что такое государственная власть?", "Это вид политической власти, где субъектом выступает государство в лице своих органов и должностных лиц."],
        ["Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ", "Что такое государство?", "Политико-территориальная суверенная организация публичной власти, обладающая аппаратом управления и принуждения."],
        ["Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ", "Назовите главные признаки государства.", "К ним относятся: территория, публичная власть, суверенитет, налоги и правотворчество."],
        ["Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ", "Что такое государственный суверенитет?", "Это независимость государства во внешней политике и верховенство его власти внутри страны."],
        ["Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ", "В чем заключается монополия государства на легальное насилие?", "Только государство имеет законное право применять принуждение к гражданам для поддержания порядка."],
        ["Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ", "Для чего государству необходимо право на взимание налогов?", "Для формирования бюджета, содержания аппарата управления и выполнения своих функций."],
        ["Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ", "На какие две группы делятся функции государства?", "На внутренние и внешние."],
        ["Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ", "Приведите примеры внутренних функций государства.", "К ним относятся: экономическая, социальная, правоохранительная, культурно-образовательная."],
        ["Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ", "Приведите примеры внешних функций государства.", "К ним относятся: оборона страны, внешнеэкономическое сотрудничество, участие в решении глобальных проблем."],
        ["Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ", "В чем суть социальной функции государства?", "В обеспечении достойного уровня жизни граждан, поддержке незащищенных слоев населения."],
        ["Тема 2. ГОСУДАРСТВО: ПРИЗНАКИ И ФУНКЦИИ", "Какова цель правоохранительной функции государства?", "Защита прав и свобод граждан, обеспечение законности и правопорядка."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Что такое форма государства?", "Это устройство политической организации общества, призванное обеспечить его стабильность и нормальное функционирование."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Из каких трех элементов состоит форма государства?", "Форма правления, форма государственно-территориального устройства и политический режим."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Что такое форма правления?", "Это способ организации верховной государственной власти и порядок ее формирования."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "На какие два основных вида делится форма правления?", "На монархию и республику."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Что такое монархия?", "Форма правления, при которой верховная власть полностью или частично принадлежит одному лицу и передается по наследству."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Чем абсолютная монархия отличается от ограниченной (конституционной)?", "В абсолютной власть монарха ничем не ограничена, а в конституционной – ограничена парламентом и конституцией."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Что такое республика?", "Форма правления, при которой высшие органы власти избираются народом на строго определенный срок."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Назовите основные виды республик.", "К ним относятся: президентская, парламентская и смешанная (полупрезидентская)."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "В чем главная особенность президентской республики?", "Президент избирается всенародно, является главой государства и сам формирует правительство."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Какова роль парламента в парламентской республике?", "Парламент формирует правительство, которое несет перед ним ответственность, и выбирает номинального президента."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Что такое форма государственно-территориального устройства?", "Это способ территориальной организации государства и распределения полномочий между центром и регионами."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Назовите три формы государственного устройства.", "Унитарное государство, федерация и конфедерация."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "В чем суть унитарного государства?", "Единое государство, части которого не обладают политической самостоятельностью (нет своих конституций и парламентов)."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Что такое федерация?", "Сложное союзное государство, части которого (субъекты) обладают определенной политической самостоятельностью и своими законами."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Что такое конфедерация?", "Союз независимых государств, созданный для достижения конкретных политических или экономических целей."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Что такое политический режим?", "Совокупность методов и способов осуществления государственной власти."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "На какие два типа делятся политические режимы?", "На демократические и недемократические (авторитарные, тоталитарные)."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Что такое тоталитаризм?", "Режим, при котором государство осуществляет всеобъемлющий (тотальный) контроль над всеми сферами жизни общества и частной жизнью граждан."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Назовите основные черты тоталитаризма.", "К ним относятся: единственная массовая партия, официальная идеология, массовый террор, монополия на СМИ."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Что такое авторитаризм?", "Режим, при котором власть жестко контролирует политическую сферу, но допускает определенную свободу в экономике и частной жизни."],
        ["Тема 3. ФОРМА ГОСУДАРСТВА (3 ЧАСТИ)", "Чем авторитаризм отличается от тоталитаризма?", "При авторитаризме нет тотального контроля над обществом, массового террора и обязательной идеологии, допускается рыночная экономика."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Что такое орган государственной власти?", "Часть государственного аппарата, наделенная властными полномочиями для осуществления функций государства."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Каков статус Президента РФ согласно Конституции?", "Президент является главой государства, гарантом Конституции и верховным главнокомандующим (не относится ни к одной из ветвей власти)."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Назовите высший орган законодательной власти в РФ.", "Федеральное Собрание (парламент)."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Из каких двух палат состоит Федеральное Собрание РФ?", "Из Совета Федерации (верхняя палата) и Государственной Думы (нижняя палата)."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Кто осуществляет исполнительную власть в РФ?", "Правительство Российской Федерации."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "К ведению какого органа относится объявление амнистии?", "Государственной Думы."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Кто решает вопрос о возможности использования Вооруженных Сил РФ за пределами территории страны?", "Совет Федерации."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "К полномочиям какого органа относится разработка и исполнение федерального бюджета?", "Правительства РФ."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Какой орган власти решает вопросы гражданства РФ и предоставления политического убежища?", "Президент РФ."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Кто утверждает изменение границ между субъектами РФ?", "Совет Федерации."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Кто назначает Председателя Центрального банка РФ?", "Государственная Дума."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Кто осуществляет управление федеральной собственностью?", "Правительство РФ."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "К полномочиям какого органа относится помилование?", "Президента РФ."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Кто осуществляет судебную власть в РФ?", "Суды (Конституционный Суд, Верховный Суд и суды общей юрисдикции)."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Что делает Конституционный Суд РФ?", "Проверяет законы и нормативные акты на соответствие Конституции РФ."],
        ["Тема 4. ОРГАНЫ ГОСУДАРСТВЕННОЙ ВЛАСТИ РФ", "Назовите высший судебный орган по гражданским, уголовным, административным и иным делам.", "Верховный Суд РФ."],
        ["Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ", "В чем суть принципа разделения властей?", "Распределение государственной власти на три независимые ветви (законодательную, исполнительную, судебную) для предотвращения узурпации."],
        ["Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ", "Что такое «система сдержек и противовесов»?", "Механизм, при котором ветви власти взаимно контролируют и ограничивают друг друга, не допуская преобладания одной из них."],
        ["Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ", "Назовите основные ветви власти.", "Законодательная, исполнительная и судебная."],
        ["Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ", "Что такое демократия?", "Политический режим, при котором народ признается единственным источником власти и носителем суверенитета."],
        ["Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ", "Перечислите основные признаки демократии.", "К ним относятся: выборность органов власти, политический плюрализм, свобода СМИ, гарантия прав и свобод человека."],
        ["Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ", "Чем прямая (непосредственная) демократия отличается от представительной?", "При прямой народ сам принимает решения (референдум), при представительной – через избранных депутатов."],
        ["Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ", "Что такое референдум?", "Всенародное голосование граждан по наиболее важным вопросам государственного или местного значения."],
        ["Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ", "Что такое политический плюрализм?", "Многообразие политических идей, взглядов, партий и движений, конкурирующих между собой."],
        ["Тема 5. ПРИНЦИП РАЗДЕЛЕНИЯ ВЛАСТЕЙ И ДЕМОКРАТИЯ", "Какова роль меньшинства в демократическом обществе?", "Большинство принимает решения, но право меньшинства на оппозицию и выражение своего мнения гарантируется законом."],
        ["Тема 6. ПРАВОВОЕ ГОСУДАРСТВО", "Что такое правовое государство?", "Демократическое государство, организация и деятельность которого подчинены праву и в котором гарантируются права и свободы граждан."],
        ["Тема 6. ПРАВОВОЕ ГОСУДАРСТВО", "Назовите главный принцип правового государства.", "Верховенство закона во всех сферах жизни общества."],
        ["Тема 6. ПРАВОВОЕ ГОСУДАРСТВО", "Что означает принцип взаимной ответственности государства и личности?", "Не только граждане несут ответственность перед законом, но и государство отвечает перед гражданами за невыполнение своих обязательств."],
        ["Тема 6. ПРАВОВОЕ ГОСУДАРСТВО", "Является ли разделение властей признаком правового государства?", "Да, это один из важнейших принципов, защищающий общество от произвола власти."],
        ["Тема 6. ПРАВОВОЕ ГОСУДАРСТВО", "Что означает «незыблемость прав и свобод человека»?", "Права человека даны ему от рождения, они признаются высшей ценностью, и государство обязано их соблюдать и защищать."],
        ["Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА", "Что такое политическая система общества?", "Это совокупность политических институтов, норм, ценностей и взаимодействий, с помощью которых осуществляется политическая власть."],
        ["Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА", "Назовите четыре основные подсистемы политической системы.", "Институциональная (организационная), нормативная, коммуникативная и культурно-идеологическая."],
        ["Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА", "Что включает в себя институциональная подсистема?", "Государство, политические партии, общественно-политические движения, СМИ."],
        ["Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА", "Из чего состоит нормативная подсистема политической системы?", "Из политических, правовых и моральных норм, обычаев и традиций, регулирующих политическую жизнь."],
        ["Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА", "Что охватывает коммуникативная подсистема?", "Все формы взаимодействия и обмена информацией между участниками политического процесса."],
        ["Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА", "Что относится к культурно-идеологической подсистеме?", "Политические идеи, идеологии, ценности, политическая культура и психология."],
        ["Тема 7. ПОЛИТИЧЕСКАЯ СИСТЕМА", "Какова главная функция политической системы?", "Определение целей развития общества, политическое руководство и интеграция общества."],
        ["Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО", "Что такое гражданское общество?", "Совокупность негосударственных отношений и организаций, выражающих частные интересы и потребности свободных граждан."],
        ["Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО", "В какой сфере возникает гражданское общество?", "Вне рамок властно-государственных структур, в сфере добровольной самоорганизации людей."],
        ["Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО", "Назовите основные признаки гражданского общества.", "К ним относятся: частная собственность, свобода экономической деятельности, независимость от государства, горизонтальные связи."],
        ["Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО", "Что понимается под «горизонтальными связями» в гражданском обществе?", "Равноправные отношения между свободными гражданами и их объединениями (в отличие от вертикальных связей подчинения в государстве)."],
        ["Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО", "Приведите примеры институтов гражданского общества.", "К ним относятся: политические партии, профсоюзы, благотворительные фонды, независимые СМИ, церковь, семья."],
        ["Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО", "Какова главная функция гражданского общества?", "Защита частных интересов граждан, контроль за деятельностью государства и предотвращение его вмешательства в частную жизнь."],
        ["Тема 8. ГРАЖДАНСКОЕ ОБЩЕСТВО", "Как связаны гражданское общество и правовое государство?", "Они не могут существовать друг без друга: гражданское общество может развиваться только в условиях демократии и правового государства."]
      ],
      "s4_2": [
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "Что такое политическая партия?", "Организация единомышленников, выражающая интересы социальных групп и стремящаяся к завоеванию государственной власти."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "Назовите основные признаки политической партии.", "К ним относятся: наличие программы и устава, организационная структура, стремление к власти."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "Каковы основные функции политических партий?", "К ним относятся: политическая социализация, выдвижение кандидатов на выборы, разработка программ развития общества."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "В чем разница между кадровыми и массовыми партиями?", "Кадровые немногочисленны и активны только в период выборов, а массовые имеют жесткую дисциплину и постоянное членство."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "Чем правящие партии отличаются от оппозиционных?", "Правящие находятся у власти, а оппозиционные выступают против политики действующего правительства."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "В чем разница между левыми, центристскими и правыми партиями?", "Левые выступают за социальное равенство, центристы – за компромисс, правые – за сохранение традиций и частной собственности."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "В чем суть консервативной идеологии?", "Опора на традиции, порядок, стабильность и сильное государство."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "Что провозглашает либеральная идеология?", "Священность частной собственности, свободу предпринимательства и приоритет прав личности."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "В чем главная идея социал-демократической идеологии?", "Защита интересов трудящихся, социальное государство и сглаживание имущественного неравенства."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "Что является основой коммунистической идеологии?", "Идея построения бесклассового общества и ликвидация частной собственности на средства производства."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "Что такое партийная система?", "Совокупность политических партий и связей между ними в государстве."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "Назовите виды партийных систем.", "Однопартийная, двухпартийная и многопартийная."],
        ["Тема 9. ПОЛИТИЧЕСКИЕ ПАРТИИ", "Что такое общественно-политическое движение?", "Добровольное формирование, стремящееся влиять на власть для решения конкретных проблем, но не ставящее целью ее завоевание."],
        ["Тема 10. ИЗБИРАТЕЛЬНАЯ СИСТЕМА", "Что такое избирательная система?", "Порядок выборов в представительные учреждения и выборных должностных лиц, а также определение результатов голосования."],
        ["Тема 10. ИЗБИРАТЕЛЬНАЯ СИСТЕМА", "Из каких двух компонентов состоит избирательная система?", "Избирательное право и избирательный процесс."],
        ["Тема 10. ИЗБИРАТЕЛЬНАЯ СИСТЕМА", "Что такое активное избирательное право?", "Право граждан участвовать в выборах в качестве избирателей (голосовать)."],
        ["Тема 10. ИЗБИРАТЕЛЬНАЯ СИСТЕМА", "Что такое пассивное избирательное право?", "Право граждан быть избранными в органы государственной власти и местного самоуправления."],
        ["Тема 10. ИЗБИРАТЕЛЬНАЯ СИСТЕМА", "Перечислите принципы демократических выборов в РФ.", "К ним относятся: всеобщее, равное и прямое избирательное право при тайном голосовании."],
        ["Тема 10. ИЗБИРАТЕЛЬНАЯ СИСТЕМА", "Что такое избирательная кампания?", "Деятельность по подготовке и проведению выборов."],
        ["Тема 10. ИЗБИРАТЕЛЬНАЯ СИСТЕМА", "В чем суть мажоритарной избирательной системы?", "Избиратели голосуют за конкретного кандидата, а побеждает набравший большинство голосов."],
        ["Тема 10. ИЗБИРАТЕЛЬНАЯ СИСТЕМА", "Что характерно для пропорциональной избирательной системы?", "Голосование идет за партийные списки, а места распределяются пропорционально набранным голосам (есть избирательный барьер)."],
        ["Тема 10. ИЗБИРАТЕЛЬНАЯ СИСТЕМА", "Что такое избирательный барьер?", "Минимальный процент голосов, который должна набрать партия для прохождения в парламент при пропорциональной системе."],
        ["Тема 10. ИЗБИРАТЕЛЬНАЯ СИСТЕМА", "Что такое смешанная избирательная система?", "Система, при которой часть депутатов избирается по мажоритарному округу, а другая часть – по партийным спискам."],
        ["Тема 11. ПОЛИТИЧЕСКОЕ УЧАСТИЕ", "Что такое политическое участие?", "Действия гражданина с целью влияния на принятие и реализацию государственных решений, выбор представителей в институты власти."],
        ["Тема 11. ПОЛИТИЧЕСКОЕ УЧАСТИЕ", "Приведите примеры прямого (непосредственного) политического участия.", "К ним относятся: участие в выборах и референдумах, посещение митингов, обращение в органы власти."],
        ["Тема 11. ПОЛИТИЧЕСКОЕ УЧАСТИЕ", "Что такое представительное (опосредованное) политическое участие?", "Осуществление власти через избранных представителей (депутатов)."],
        ["Тема 11. ПОЛИТИЧЕСКОЕ УЧАСТИЕ", "Что такое политическая культура?", "Уровень и характер политических взглядов, знаний и убеждений граждан, степень их политической активности."],
        ["Тема 11. ПОЛИТИЧЕСКОЕ УЧАСТИЕ", "Что такое абсентеизм?", "Сознательное уклонение граждан от участия в политических действиях (отказ от голосования на выборах)."],
        ["Тема 11. ПОЛИТИЧЕСКОЕ УЧАСТИЕ", "Назовите основные причины абсентеизма.", "К ним относятся: недоверие к политикам, падение уровня жизни, уверенность в том, что от голоса ничего не зависит."],
        ["Тема 12. ПОЛИТИЧЕСКАЯ ЭЛИТА", "Что такое политическая элита?", "Относительно немногочисленная социальная группа, сосредоточившая в своих руках значительный объем политической власти."],
        ["Тема 12. ПОЛИТИЧЕСКАЯ ЭЛИТА", "Назовите причины возникновения политической элиты.", "Необходимость профессионального управления обществом, политическая пассивность большинства, неравенство в доступе к ресурсам."],
        ["Тема 12. ПОЛИТИЧЕСКАЯ ЭЛИТА", "Какие функции выполняет политическая элита?", "К ним относятся: определение целей развития общества, принятие политических решений, выдвижение лидеров."],
        ["Тема 12. ПОЛИТИЧЕСКАЯ ЭЛИТА", "Как политическая элита делится по отношению к власти?", "На правящую элиту и контрэлиту (оппозиционную элиту)."],
        ["Тема 12. ПОЛИТИЧЕСКАЯ ЭЛИТА", "Какие два основных пути рекрутирования (отбора) элит существуют?", "Закрытая (гильдейская) система и открытая (антрепренерская) система."],
        ["Тема 13. ПОЛИТИЧЕСКОЕ ЛИДЕРСТВО", "Что такое политическое лидерство?", "Способность определенного лица решающим образом постоянно влиять на все общество, группу, организацию."],
        ["Тема 13. ПОЛИТИЧЕСКОЕ ЛИДЕРСТВО", "Кто такой политический лидер?", "Ведущий субъект политического процесса, осуществляющий объединение и сплочение социальных сил."],
        ["Тема 13. ПОЛИТИЧЕСКОЕ ЛИДЕРСТВО", "Каковы основные функции политического лидера?", "Интегративная (объединение общества), ориентационная (выработка курса), коммуникативная (связь власти и масс)."],
        ["Тема 13. ПОЛИТИЧЕСКОЕ ЛИДЕРСТВО", "Как делятся политические лидеры по способу легитимации власти?", "На традиционных, харизматических и рационально-легальных."],
        ["Тема 13. ПОЛИТИЧЕСКОЕ ЛИДЕРСТВО", "Приведите пример традиционного лидерства.", "Власть монарха, опирающаяся на обычаи и веру в святость традиций."],
        ["Тема 13. ПОЛИТИЧЕСКОЕ ЛИДЕРСТВО", "Чем отличается рационально-легальное лидерство?", "Лидер получает власть законным путем через выборы, его полномочия ограничены конституцией."],
        ["Тема 13. ПОЛИТИЧЕСКОЕ ЛИДЕРСТВО", "Назовите типы лидерства по стилю управления.", "Демократическое и авторитарное."],
        ["Тема 14. ПОЛИТИЧЕСКИЙ ПРОЦЕСС", "Что такое политический процесс?", "Совокупность действий субъектов политики, направленных на осуществление своих ролей и функций в рамках политической системы."],
        ["Тема 14. ПОЛИТИЧЕСКИЙ ПРОЦЕСС", "Кого относят к субъектам политического процесса?", "К ним относятся: государство, политические партии, граждане (электорат), политические лидеры."],
        ["Тема 14. ПОЛИТИЧЕСКИЙ ПРОЦЕСС", "Назовите основные стадии политического процесса.", "Выявление проблемы, принятие решения, исполнение решения, контроль за исполнением и оценка результатов."],
        ["Тема 15. СМИ В ПОЛИТИЧЕСКОЙ СИСТЕМЕ", "Что такое средства массовой информации (СМИ)?", "Организационно-технические комплексы быстрой передачи и массового тиражирования информации."],
        ["Тема 15. СМИ В ПОЛИТИЧЕСКОЙ СИСТЕМЕ", "Перечислите отличительные признаки СМИ.", "Сбор и обработка информации, периодичность работы, неограниченный круг потребителей (массовость)."],
        ["Тема 15. СМИ В ПОЛИТИЧЕСКОЙ СИСТЕМЕ", "Каковы основные функции СМИ в политике?", "К ним относятся: информационная, формирование общественного мнения, политическая социализация, критика власти."],
        ["Тема 15. СМИ В ПОЛИТИЧЕСКОЙ СИСТЕМЕ", "Почему СМИ часто называют «четвертой властью»?", "Из-за их огромного влияния на общество и способности формировать политические взгляды и настроения граждан."],
        ["Тема 15. СМИ В ПОЛИТИЧЕСКОЙ СИСТЕМЕ", "Что такое цензура?", "Прямой или косвенный контроль со стороны государства за содержанием информации, распространяемой СМИ."]

      "s5_1": [
        ["Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА", "Что такое право?", "Это система общеобязательных, формально определенных норм, установленных и охраняемых государством."],
        ["Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА", "Какова главная цель права?", "Регулирование общественных отношений и поддержание порядка в государстве."],
        ["Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА", "Назовите основные признаки права.", "К ним относятся: общеобязательность, формальная определенность, обеспеченность силой государства, системность."],

        ["Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА", "Что означает признак «общеобязательность» права?", "Нормы права обязательны для исполнения всеми гражданами, организациями и государственными органами."],
        ["Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА", "В чем отличие норм права от норм морали по способу обеспечения?", "Нормы права обеспечиваются принудительной силой государства, а мораль – силой общественного мнения."],
        ["Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА", "В чем отличие норм права от норм морали по форме выражения?", "Право всегда закреплено в официальных документах, а мораль существует в сознании людей."],
        ["Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА", "Что такое объективное право?", "Это система действующих в государстве правовых норм."],
        ["Тема 1. ПОНЯТИЕ И ПРИЗНАКИ ПРАВА", "Что такое субъективное право?", "Официально признанные возможности, которыми располагает конкретный человек (например, право на образование)."],
        ["Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.", "Каковы основные функции права?", "К ним относятся: регулятивная, охранительная, воспитательная и оценочная."],
        ["Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.", "В чем заключается регулятивная функция права?", "В упорядочивании общественных отношений и установлении правил поведения."],
        ["Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.", "В чем заключается охранительная функция права?", "В защите наиболее важных общественных отношений и наказании правонарушителей."],
        ["Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.", "Что такое норма права?", "Установленное государством общеобязательное правило поведения, регулирующее конкретное общественное отношение."],
        ["Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.", "Назовите три элемента структуры правовой нормы.", "К ним относятся: гипотеза, диспозиция и санкция."],

        ["Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.", "Что такое диспозиция в структуре правовой нормы?", "Само правило поведения, права и обязанности субъектов."],

        ["Тема 2. ФУНКЦИИ ПРАВА. СТРУКТУРА ПРАВОВОЙ НОРМЫ И ВИДЫ.", "Приведите пример запрещающей нормы права.", "Закон запрещает управлять автомобилем в состоянии алкогольного опьянения."],

        ["Тема 3. ИСТОЧНИКИ ПРАВА", "Назовите основные источники права.", "К ним относятся: правовой обычай, судебный прецедент, нормативный договор, нормативный правовой акт."],

        ["Тема 4. ПРАВООТНОШЕНИЯ", "Что включает в себя содержание правоотношения?", "Субъективные права и юридические обязанности участников."],
        ["Тема 4. ПРАВООТНОШЕНИЯ", "Что такое правоспособность?", "Установленная законом способность лица иметь субъективные права и нести юридические обязанности."],

        ["Тема 4. ПРАВООТНОШЕНИЯ", "Что такое дееспособность?", "Способность лица своими действиями приобретать и осуществлять права, создавать и исполнять обязанности."],

      try {
        if (element.requestFullscreen) {
          element.requestFullscreen().catch(err => console.warn('Fullscreen err:', err));
        } else if (element.webkitRequestFullscreen) {
          element.webkitRequestFullscreen();
        } else if (element.msRequestFullscreen) {
          element.msRequestFullscreen();
        }
      } catch (e) {
        console.warn('API не поддерживается:', e);
      }
    }

    els.btnBigStart.addEventListener('click', () => {
      requestFullScreenSafe(document.documentElement);
      els.startScreen.classList.add('hidden');
      updateUI();
      scaleTextToFit();
    });

    els.btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        requestFullScreenSafe(document.documentElement);
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        }
      }
    });

    function updateFullscreenIcon() {
      if (document.fullscreenElement || document.webkitFullscreenElement) {
        els.fullscreenIconUse.setAttribute('href', '#icon-minimize');
      } else {
        els.fullscreenIconUse.setAttribute('href', '#icon-maximize');
      }
    }
    
    document.addEventListener('fullscreenchange', updateFullscreenIcon);
    document.addEventListener('webkitfullscreenchange', updateFullscreenIcon);

    els.sectionSelector.addEventListener('change', (e) => {
      currentDbKey = e.target.value;
      cards = [...databases[currentDbKey]];
      learnedIds.clear();
      activeTab = 'all';
      currentIndex = 0;
      isFlipped = false;
      
      els.cardWrapper.classList.remove('flipped');
      els.cardWrapper.style.transition = 'none';
      els.cardWrapper.style.transform = 'translateX(0) rotate(0)';
      
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      els.tabAll.classList.add('active');
      
      updateUI();
    });

    function scaleTextToFit() {
      if (els.startScreen.classList.contains('hidden') === false) return;
      
      requestAnimationFrame(() => {
        const currentCard = getFilteredCards()[currentIndex];
        if (!currentCard) return;

        const frontFace = document.querySelector('.card-front');
        const backFace = document.querySelector('.card-back');
        if (!frontFace || !backFace) return;

        let measurer = document.getElementById('text-measurer');
        if (!measurer) {
          measurer = document.createElement('div');
          measurer.id = 'text-measurer';
          measurer.style.position = 'absolute';
          measurer.style.visibility = 'hidden';
          measurer.style.pointerEvents = 'none';
          measurer.style.left = '-9999px';
          measurer.style.top = '-9999px';
          measurer.style.wordWrap = 'break-word';
          measurer.style.overflowWrap = 'break-word';
          measurer.style.textAlign = 'center';
          measurer.style.lineHeight = '1.5';
          measurer.style.fontFamily = 'system-ui, -apple-system, sans-serif';
          measurer.style.margin = '0';
          document.body.appendChild(measurer);
        }

        const fitText = (container, textElement, text, isBack) => {
          if (!container || !textElement || container.clientHeight === 0) return;

          const style = window.getComputedStyle(container);
          const paddingX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
          const paddingY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);

          measurer.style.width = (container.clientWidth - paddingX) + 'px';
          measurer.style.fontWeight = isBack ? '500' : '600';
          measurer.textContent = text;

          let maxAllowedHeight = container.clientHeight - paddingY - 10; 

          if (isBack && els.cardTopicHint.style.display !== 'none') {
            const hintStyle = window.getComputedStyle(els.cardTopicHint);
            const hintHeight = els.cardTopicHint.offsetHeight + parseFloat(hintStyle.marginTop) + parseFloat(hintStyle.marginBottom);
            maxAllowedHeight -= hintHeight;
          }

          let fontSize = window.innerWidth >= 768 ? 24 : 18.4;
          measurer.style.fontSize = fontSize + 'px';

          const minFontSize = 12; 
          let safety = 50; 
          
          while (measurer.scrollHeight > maxAllowedHeight && fontSize > minFontSize && safety > 0) {
            fontSize -= 0.5;
            measurer.style.fontSize = fontSize + 'px';
            safety--;
          }

          textElement.style.fontSize = fontSize + 'px';
        };

        fitText(frontFace, els.cardQuestion, currentCard.question, false);
        fitText(backFace, els.cardAnswer, currentCard.answer, true);
      });
    }

    window.addEventListener('resize', scaleTextToFit);

    function getFilteredCards() {
      return cards.filter(card => {
        if (activeTab === 'learned') return learnedIds.has(card.id);
        if (activeTab === 'learning') return !learnedIds.has(card.id);
        return true;
      });
    }

    function updateUI() {
      els.tabAll.textContent = `Все термины (${cards.length})`;
      els.tabLearning.textContent = `Осталось выучить (${cards.length - learnedIds.size})`;
      els.tabLearned.textContent = `Выученные (${learnedIds.size})`;
      els.fileStatusText.textContent = `Загружено: ${cards.length} карточек`;

      const filtered = getFilteredCards();

      if (filtered.length === 0) {
        els.mainContent.style.display = 'none';
        els.emptyState.style.display = 'block';
      } else {
        els.mainContent.style.display = 'flex';
        els.emptyState.style.display = 'none';

        if (currentIndex >= filtered.length) currentIndex = 0;

        const currentCard = filtered[currentIndex];
        els.cardQuestion.textContent = currentCard.question;
        els.cardAnswer.textContent = currentCard.answer;
        els.statusText.textContent = `Карточка ${currentIndex + 1} из ${filtered.length}`;

        if (currentCard.topic) {
          const match = currentCard.topic.match(/^(Тема\s*\d+\.?)/i);
          const shortTopic = match ? match[1] : currentCard.topic;
          els.cardTopicHint.innerHTML = `<svg class="icon icon-sm"><use href="#icon-book"></use></svg> <span>${shortTopic}</span>`;
          els.cardTopicHint.style.display = 'flex';
        } else {
          els.cardTopicHint.style.display = 'none';
        }

        if (learnedIds.has(currentCard.id)) {
          els.btnCheck.classList.add('active');
          els.btnCheck.title = 'Убрать из выученных';
        } else {
          els.btnCheck.classList.remove('active');
          els.btnCheck.title = 'Отметить как выученное';
        }

        scaleTextToFit();
      }
    }

    function switchTab(tabId) {
      activeTab = tabId;
      currentIndex = 0;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      
      updateUI();
    }

    els.tabAll.addEventListener('click', () => switchTab('all'));
    els.tabLearning.addEventListener('click', () => switchTab('learning'));
    els.tabLearned.addEventListener('click', () => switchTab('learned'));

    let startX = 0, startY = 0, currentX = 0;
    let isDragging = false;
    let hasDragged = false;
    let isScrolling = false;
    let wasSwiped = false; 

    function handleDragStart(clientX, clientY) {
      isDragging = true;
      hasDragged = false;
      isScrolling = false;
      wasSwiped = false;
      startX = clientX;
      startY = clientY;
      currentX = startX;
      els.cardWrapper.style.transition = 'none';
    }

    function handleDragMove(clientX, clientY, e) {
      if (!isDragging) return;
      
      currentX = clientX;
      const deltaX = currentX - startX;
      const deltaY = clientY - startY;

      if (!hasDragged && !isScrolling) {
        if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 5) {
          isScrolling = true;
          isDragging = false; 
          els.cardWrapper.style.transition = 'transform 0.25s ease';
          els.cardWrapper.style.transform = 'translateX(0) rotate(0)';
          return;
        }
        if (Math.abs(deltaX) > 5) {
          hasDragged = true;
        }
      }

      if (isScrolling) return;

      if (hasDragged) {
        if (e.cancelable) e.preventDefault(); 
        
        wasSwiped = true;
        const rotate = deltaX * 0.05;
        els.cardWrapper.style.transform = `translateX(${deltaX}px) rotate(${rotate}deg)`;
        
        if (deltaX > 20) {
          els.badgeRight.style.opacity = Math.min(deltaX / 100, 1);
          els.badgeLeft.style.opacity = 0;
        } else if (deltaX < -20) {
          els.badgeLeft.style.opacity = Math.min(Math.abs(deltaX) / 100, 1);
          els.badgeRight.style.opacity = 0;
        } else {
          els.badgeRight.style.opacity = 0;
          els.badgeLeft.style.opacity = 0;
        }
      }
    }

    function handleDragEnd() {
      if (!isDragging) return;
      isDragging = false;
      
      if (isScrolling) return;

      const deltaX = currentX - startX;
      
      els.cardWrapper.style.transition = 'transform 0.3s ease-out';

      const threshold = Math.max(window.innerWidth * 0.25, 80);

      if (hasDragged) {
        if (deltaX > threshold) {
          handleSwipe('right');
        } else if (deltaX < -threshold) {
          handleSwipe('left');
        } else {
          els.cardWrapper.style.transform = 'translateX(0) rotate(0)';
          els.badgeRight.style.opacity = 0;
          els.badgeLeft.style.opacity = 0;
        }
      }
    }

    els.cardWrapper.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      handleDragStart(e.clientX, e.clientY);
    });
    window.addEventListener('mousemove', (e) => {
      handleDragMove(e.clientX, e.clientY, e);
    }, { passive: false });
    window.addEventListener('mouseup', handleDragEnd);

    els.cardWrapper.addEventListener('touchstart', (e) => {
      handleDragStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    
    window.addEventListener('touchmove', (e) => {
      handleDragMove(e.touches[0].clientX, e.touches[0].clientY, e);
    }, { passive: false });
    
    window.addEventListener('touchend', handleDragEnd);
    window.addEventListener('touchcancel', handleDragEnd);

    function handleSwipe(direction) {
      const filtered = getFilteredCards();
      if (filtered.length === 0) return;
      const currentCard = filtered[currentIndex];

      const throwX = direction === 'right' ? window.innerWidth : -window.innerWidth;
      const rotate = direction === 'right' ? 30 : -30;
      els.cardWrapper.style.transform = `translateX(${throwX}px) rotate(${rotate}deg)`;
      
      setTimeout(() => {
        if (direction === 'right') {
          learnedIds.add(currentCard.id);
        } else {
          learnedIds.delete(currentCard.id);
        }

        const newFiltered = cards.filter(c => {
          if (activeTab === 'learned') return learnedIds.has(c.id);
          if (activeTab === 'learning') return !learnedIds.has(c.id);
          return true;
        });

        if (newFiltered.length > 0) {
          if (newFiltered.find(c => c.id === currentCard.id)) {
            currentIndex = (currentIndex + 1) % newFiltered.length;
          } else {
            if (currentIndex >= newFiltered.length) currentIndex = 0;
          }
        } else {
          currentIndex = 0;
        }

        isFlipped = false;
        els.cardWrapper.classList.remove('flipped');
        
        els.cardWrapper.style.transition = 'none';
        els.cardWrapper.style.transform = 'translateX(0) rotate(0)';
        els.badgeRight.style.opacity = 0;
        els.badgeLeft.style.opacity = 0;
        
        updateUI();
      }, 300);
    }

    els.cardWrapper.addEventListener('click', (e) => {
      if (wasSwiped) {
        e.preventDefault();
        return;
      }
      isFlipped = !isFlipped;
      els.cardWrapper.classList.toggle('flipped', isFlipped);
    });

    els.btnNext.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length <= 1) return;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      setTimeout(() => {
        currentIndex = (currentIndex + 1) % filtered.length;
        updateUI();
      }, 150);
    });

    els.btnPrev.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length <= 1) return;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      setTimeout(() => {
        currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
        updateUI();
      }, 150);
    });

    els.btnShuffle.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length <= 1) return;
      isFlipped = false;
      els.cardWrapper.classList.remove('flipped');
      setTimeout(() => {
        cards.sort(() => Math.random() - 0.5);
        currentIndex = 0;
        updateUI();
      }, 150);
    });

    els.btnCheck.addEventListener('click', () => {
      const filtered = getFilteredCards();
      if (filtered.length === 0) return;
      const currentCard = filtered[currentIndex];
      
      if (learnedIds.has(currentCard.id)) {
        learnedIds.delete(currentCard.id);
      } else {
        learnedIds.add(currentCard.id);
      }
      updateUI();
    });

    els.btnTheme.addEventListener('click', () => {
      theme = theme === 'light' ? 'dark' : 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        els.themeIconUse.setAttribute('href', '#icon-sun');
      } else {
        document.documentElement.removeAttribute('data-theme');
        els.themeIconUse.setAttribute('href', '#icon-moon');
      }
    });

    updateUI();
  </script>
</body>
</html>
