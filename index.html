<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ЕГЭ Обществознание – Карточки</title>
  <style>
    :root {
      --bg-color: #f8fafc;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --card-front-bg: #ffffff;
      --card-back-bg: #eff6ff;
      --border-color: #e2e8f0;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #10b981;
      --shadow-color: rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      --bg-color: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-front-bg: #1e293b;
      --card-back-bg: #172554;
      --border-color: #334155;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --success: #34d399;
      --shadow-color: rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; }
    
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      background-color: var(--bg-color);
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      font-family: system-ui, -apple-system, sans-serif;
    }

    @supports (-webkit-touch-callout: none) {
      html, body {
        height: -webkit-fill-available;
      }
    }

    :-webkit-full-screen {
      width: 100% !important;
      height: 100% !important;
      background-color: var(--bg-color);
    }

    .start-screen-overlay, .app-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .app-container {
      background: linear-gradient(135deg, var(--bg-color) 0%, var(--card-front-bg) 100%);
      color: var(--text-main);
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      z-index: 1;
    }
    @media (min-width: 768px) {
      .app-container { padding: 1.5rem 1rem; }
    }

    .start-screen-overlay {
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 1.5rem;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    [data-theme="dark"] .start-screen-overlay {
      background-color: #0f172a;
    }
    .start-screen-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    
    .start-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: #1e293b;
      text-align: center;
      margin: 0;
      padding: 0 1rem;
    }
    .start-subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    @media (min-width: 768px) {
      .start-title { font-size: 3rem; }
      .start-subtitle { font-size: 1.5rem; }
    }
    [data-theme="dark"] .start-title { color: #f8fafc; }

    .btn-start {
      font-size: 1rem;
      font-weight: 800;
      padding: 0.8rem 2.5rem;
      border-radius: 1rem;
      background: var(--accent);
      color: #ffffff;
      border: none;
      box-shadow: 0 10px 30px var(--shadow-color), 0 0 0 0 rgba(37, 99, 235, 0.4);
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      animation: pulse-start 2s infinite;
      -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 768px) {
      .btn-start {
        font-size: 1.75rem;
        padding: 1.5rem 4rem;
        border-radius: 1.5rem;
      }
    }
    .btn-start:hover {
      transform: scale(1.05) translateY(-5px);
      background: var(--accent-hover);
    }
    @keyframes pulse-start {
      0% { box-shadow: 0 10px 30px var(--shadow-color), 0 0 0 0 rgba(37, 99, 235, 0.4); }
      70% { box-shadow: 0 10px 30px var(--shadow-color), 0 0 0 20px rgba(37, 99, 235, 0); }
      100% { box-shadow: 0 10px 30px var(--shadow-color), 0 0 0 0 rgba(37, 99, 235, 0); }
    }

    /* Header */
    .header {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      flex-shrink: 0;
    }
    @media (min-width: 768px) {
      .header {
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }
    }

    .header-title { font-size: 1.25rem; line-height: 1.2; font-weight: 800; margin: 0 0 0.25rem 0; }
    @media (min-width: 768px) {
      .header-title { font-size: 1.75rem; margin: 0 0 0.5rem 0; }
    }

    .header-subtitle { font-size: 0.75rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.35rem; margin: 0; line-height: 1.2; font-weight: 500;}
    @media (min-width: 768px) {
      .header-subtitle { font-size: 0.875rem; gap: 0.5rem; }
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      justify-content: space-between;
    }
    @media (min-width: 768px) {
      .header-actions { width: auto; justify-content: flex-end; gap: 0.75rem;}
    }

    /* Section Selector */
    .section-select {
      appearance: none;
      background-color: var(--card-front-bg);
      color: var(--text-main);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 0.5rem 2rem 0.5rem 0.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background-image: url('data:image/svg+xml;utf8,<svg fill="%2364748b" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 0.5rem center;
      background-size: 1.25rem;
      outline: none;
      max-width: 220px;
      text-overflow: ellipsis;
      white-space: nowrap;
      overflow: hidden;
      transition: all 0.2s ease;
    }
    .section-select:hover { border-color: var(--accent); }
    @media (min-width: 768px) {
      .section-select { max-width: 300px; font-size: 0.95rem; }
    }

    .icon { width: 1.25rem; height: 1.25rem; flex-shrink: 0; }
    .icon-sm { width: 1rem; height: 1rem; }
    .icon-lg { width: 1.75rem; height: 1.75rem; }
    .text-success { color: var(--success); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid var(--border-color);
      background: var(--card-front-bg);
      color: var(--text-main);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { border-color: var(--accent); }
    .btn-icon { padding: 0.5rem; border-radius: 0.5rem; }
    
    .btn.btn-blue {
      background-color: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }
    .btn.btn-blue:hover {
      background-color: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    /* Tabs */
    .tabs-wrapper {
      width: 100%;
      max-width: 800px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      margin-bottom: 1rem;
      flex-shrink: 0;
    }
    .tabs-wrapper::-webkit-scrollbar { display: none; }
    @media (min-width: 768px) {
      .tabs-wrapper { margin-bottom: 1.5rem; }
    }

    .tabs {
      display: flex;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
    }
    .tab {
      white-space: nowrap;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: var(--card-front-bg);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    #main-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-grow: 1;
      justify-content: flex-start;
      min-height: 0;
    }

    .status-text {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    /* Card */
    .card-wrapper {
      width: 100%;
      max-width: 600px;
      flex: 1 1 auto;
      min-height: 200px;
      max-height: 320px;
      perspective: 1000px;
      cursor: pointer;
      margin-bottom: 1.5rem;
      user-select: none;
      will-change: transform;
      -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 768px) { 
      .card-wrapper { 
        max-height: 384px; 
        margin-bottom: 2rem;
      } 
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      box-shadow: 0 10px 25px var(--shadow-color);
      border-radius: 1rem;
    }
    .card-wrapper.flipped .card-inner { transform: rotateX(180deg); }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem; 
      border-radius: 1rem;
      border-top: 4px solid;
      transition: background-color 0.3s ease, border-color 0.3s ease;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain; 
      scrollbar-width: thin;
      scrollbar-color: var(--border-color) transparent;
    }
    @media (min-width: 768px) {
      .card-face { padding: 4rem 1.5rem; }
    }

    .card-face::before { content: ""; margin-top: auto; }
    .card-face::after { content: ""; margin-bottom: auto; }
    .card-face::-webkit-scrollbar { width: 6px; }
    .card-face::-webkit-scrollbar-track { background: transparent; }
    .card-face::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 10px; }

    .card-front {
      background: var(--card-front-bg);
      border-top-color: var(--accent);
    }
    .card-back {
      background: var(--card-back-bg);
      border-top-color: var(--success);
      transform: rotateX(180deg);
    }

    .card-label {
      position: absolute;
      top: 1rem;
      left: 1rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .card-front .card-label { color: var(--accent); }
    .card-back .card-label { color: var(--success); }

    .card-content { 
      font-size: 1.15rem; 
      font-weight: 600; 
      line-height: 1.5; 
      width: 100%;
      text-align: center;
      word-wrap: break-word;
      overflow-wrap: break-word;
      flex-shrink: 0; 
      margin: 0;
    }
    @media (min-width: 768px) { .card-content { font-size: 1.5rem; } }
    .card-back .card-content { font-weight: 500; color: var(--text-main); }

    .card-hint {
      position: absolute;
      bottom: 1rem;
      font-size: 0.875rem;
      color: var(--text-muted);
      animation: pulse 2s infinite;
    }

    .swipe-badge {
      position: absolute;
      top: 2rem;
      padding: 0.5rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 800;
      font-size: 1.5rem;
      text-transform: uppercase;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      letter-spacing: 0.1em;
    }
    .swipe-badge-left { right: 2rem; color: #ef4444; border: 4px solid #ef4444; transform: rotate(15deg); }
    .swipe-badge-right { left: 2rem; color: #10b981; border: 4px solid #10b981; transform: rotate(-15deg); }

    .card-topic-hint {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--border-color);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      justify-content: center;
      text-align: center;
      flex-shrink: 0;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      margin-bottom: 0.5rem;
    }
    @media (min-width: 768px) { .controls { gap: 1.5rem; margin-bottom: 1rem; } }

    .btn-control {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--card-front-bg);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-control:hover { transform: scale(1.05); border-color: var(--accent); }

    .btn-nav { width: 3rem; height: 3rem; }
    .btn-action { width: 3rem; height: 3rem; color: var(--text-muted); }
    .btn-action.active { background: var(--success); color: #fff; border-color: var(--success); }

    .btn-main {
      width: 3.5rem; height: 3.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      box-shadow: 0 4px 10px var(--shadow-color);
    }
    .btn-main:hover { background: var(--accent-hover); }
    @media (min-width: 768px) {
      .btn-nav, .btn-action { width: 3.5rem; height: 3.5rem; }
      .btn-main { width: 4rem; height: 4rem; }
    }

    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 1.125rem;
      display: none;
    }
  </style>
</head>
<body>

  <svg style="display: none;">
    <defs>
      <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </symbol>
      <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </symbol>
      <symbol id="icon-check-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </symbol>
      <symbol id="icon-shuffle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"></polyline>
        <line x1="4" y1="20" x2="21" y2="3"></line>
        <polyline points="21 16 21 21 16 21"></polyline>
        <line x1="15" y1="15" x2="21" y2="21"></line>
        <line x1="4" y1="4" x2="9" y2="9"></line>
      </symbol>
      <symbol id="icon-prev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </symbol>
      <symbol id="icon-next" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </symbol>
      <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
      </symbol>
      <symbol id="icon-maximize" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
      </symbol>
      <symbol id="icon-minimize" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>
      </symbol>
    </defs>
  </svg>

  <div class="start-screen-overlay" id="start-screen">
    <h1 class="start-title">ЕГЭ Обществознание</h1>
    <p class="start-subtitle">Интерактивные карточки (558 шт.)</p>
    <button class="btn-start" id="btn-big-start">Начать</button>
  </div>

  <div class="app-container" id="app-container">
    <div class="header">
      <div>
        <h1 class="header-title">Обществознание</h1>
        <p class="header-subtitle" id="header-subtitle">
          <svg class="icon icon-sm text-success"><use href="#icon-check-circle"></use></svg>
          <span id="file-status-text">База загружается...</span>
        </p>
      </div>
      
      <div class="header-actions">
        <!-- Селектор разделов -->
        <select id="section-selector" class="section-select">
          <option value="s1">Раздел 1. Человек и общество</option>
          <option value="s2">Раздел 2. Социальные отношения</option>
          <option value="s3_1">Раздел 3. Экономика (Часть 1)</option>
          <option value="s3_2">Раздел 3. Экономика (Часть 2)</option>
          <option value="s4_1">Раздел 4. Политика (Часть 1)</option>
          <option value="s4_2">Раздел 4. Политика (Часть 2)</option>
          <option value="s5_1">Раздел 5. Право (Часть 1)</option>
          <option value="s5_2">Раздел 5. Право (Часть 2)</option>
        </select>

        <div style="display:flex; gap:0.5rem;">
          <button class="btn btn-icon" id="btn-theme" title="Переключить тему">
            <svg class="icon"><use id="theme-icon-use" href="#icon-moon"></use></svg>
          </button>
          <button class="btn btn-icon btn-blue" id="btn-fullscreen" title="Полноэкранный режим">
            <svg class="icon"><use id="fullscreen-icon-use" href="#icon-maximize"></use></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="tabs-wrapper">
      <div class="tabs" id="tabs-container">
        <button class="tab active" data-tab="all" id="tab-all">Все термины (0)</button>
        <button class="tab" data-tab="learning" id="tab-learning">Осталось выучить (0)</button>
        <button class="tab" data-tab="learned" id="tab-learned">Выученные (0)</button>
      </div>
    </div>

    <div id="main-content">
      <div class="status-text" id="status-text">Карточка 1 из 0</div>

      <div class="card-wrapper" id="card-wrapper">
        <div class="swipe-badge swipe-badge-left" id="badge-left">Повторить</div>
        <div class="swipe-badge swipe-badge-right" id="badge-right">Выучил</div>
        <div class="card-inner">
          <div class="card-face card-front">
            <span class="card-label">Вопрос</span>
            <h2 class="card-content" id="card-question"></h2>
            <p class="card-hint">Нажмите, чтобы перевернуть</p>
          </div>
          <div class="card-face card-back">
            <span class="card-label">Ответ</span>
            <p class="card-content" id="card-answer"></p>
            <div class="card-topic-hint" id="card-topic-hint"></div>
          </div>
        </div>
      </div>

      <div class="controls" id="controls">
        <button class="btn-control btn-action" id="btn-shuffle" title="Перемешать все">
          <svg class="icon"><use href="#icon-shuffle"></use></svg>
        </button>
        <button class="btn-control btn-nav" id="btn-prev" title="Предыдущая">
          <svg class="icon"><use href="#icon-prev"></use></svg>
        </button>
        <button class="btn-control btn-main" id="btn-next" title="Следующая">
          <svg class="icon icon-lg"><use href="#icon-next"></use></svg>
        </button>
        <button class="btn-control btn-action" id="btn-check" title="Отметить как выученное">
          <svg class="icon"><use href="#icon-check"></use></svg>
        </button>
